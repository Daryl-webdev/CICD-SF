name: Deploy to Daryl Environment

on:
  push:
    branches: [main]
    paths:
      - "force-app/**"

jobs:
  deploy_daryl:
    runs-on: ubuntu-latest
    environment: daryl

    steps:
      # ------------------------------
      # Checkout
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # ------------------------------
      # Install Salesforce CLI
      # ------------------------------
      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Show sf version
        run: sf --version

      # ------------------------------
      # Install sfdx-git-delta via npm (stable / recommended)
      # ------------------------------
      - name: Install sfdx-git-delta
        run: |
          sudo npm install -g sfdx-git-delta

          # Compute global npm bin path
          NPM_GLOBAL=$(npm bin -g)
          echo "NPM global bin: $NPM_GLOBAL"

          # Add global npm path to PATH for this step
          export PATH="$NPM_GLOBAL:$PATH"

          # Debug PATH
          echo "PATH = $PATH"

          # Verify sgd exists (does NOT fail the step)
          command -v sgd || echo "sgd not found"

      # ------------------------------
      # Generate delta using sgd
      # ------------------------------
      - name: Generate delta
        run: |
          mkdir changed-sources

          # Re-add npm global path inside this step
          NPM_GLOBAL=$(npm bin -g)
          export PATH="$NPM_GLOBAL:$PATH"

          echo "Using sgd from: $(command -v sgd || echo 'NOT FOUND')"

          sgd source delta \
            --from ${{ github.event.before }} \
            --to ${{ github.sha }} \
            --output changed-sources \
            --generate-delta \
            --source force-app

          echo "Delta generated"

      # ------------------------------
      # Authenticate org
      # ------------------------------
      - name: Authenticate Salesforce Org
        run: |
          echo "${{ secrets.JWT_SERVER_KEY }}" > server.key
          chmod 600 server.key

          sf org login jwt \
            --username ${{ secrets.SF_USERNAME }} \
            --jwt-key-file server.key \
            --client-id ${{ secrets.SF_LEGACY_KEY }} \
            --instance-url ${{ vars.INSTANCE_URL }} \
            --alias daryl \
            --set-default

      # ------------------------------
      # Detect changed Apex tests
      # ------------------------------
      - name: Detect changed Apex tests
        id: tests
        run: |
          TESTS=$(find changed-sources -name "*Test.cls" | sed 's#.*/##' | sed 's/.cls//' | paste -sd "," -)
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "Detected tests: $TESTS"

      # ------------------------------
      # Deploy to Salesforce
      # ------------------------------
      - name: Deploy delta
        run: |
          if [ -d "changed-sources/force-app" ]; then
            echo "Metadata changes detected."

            if [ -n "${{ steps.tests.outputs.tests }}" ]; then
              # Run only the tests that changed
              echo "Running tests: ${{ steps.tests.outputs.tests }}"
              sf project deploy start \
                --source-dir changed-sources/force-app \
                --test-level RunSpecifiedTests \
                --tests "${{ steps.tests.outputs.tests }}" \
                --wait 30
            else
              echo "No specific tests changed. Running local tests."
              sf project deploy start \
                --source-dir changed-sources/force-app \
                --test-level RunLocalTests \
                --wait 30
            fi
          else
            echo "No metadata changes detected. Skipping deployment."
          fi

